services:
  # --------------------------------------------------------
  # Discord Bot (C# .NET 9.0)
  # --------------------------------------------------------
  discord-bot:
    image: ahmanamjardir/laskbot:1.0
    container_name: discord-bot-ai
    restart: unless-stopped
    depends_on:
      openclaw:
        condition: service_started
    env_file:
      - .env
    environment:
      - OPENCLAW_BASE_URL=http://openclaw:8080
      - AGENT_SESSION_TIMEOUT_MINUTES=${AGENT_SESSION_TIMEOUT_MINUTES:-10}
      - AGENT_MAX_RETRIES=${AGENT_MAX_RETRIES:-5}
      - AGENT_MAX_CONCURRENT_TASKS=${AGENT_MAX_CONCURRENT_TASKS:-2}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3-flash-preview}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
    volumes:
      - bot-data:/app/data
      - bot-logs:/app/logs
    networks:
      - bot-internal
      - bot-external
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /home/botuser:size=16M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------
  # OpenClaw Agent (Python + .NET + Node)
  # --------------------------------------------------------
  openclaw:
    image: ahmanamjardir/openclaw-agent:1.0
    container_name: openclaw-agent
    user: root
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - PORT=8080
      - MAX_TOOL_ROUNDS=${MAX_TOOL_ROUNDS:-20}
      - MAX_TOKENS=${MAX_TOKENS:-4096}
      - AGENT_SESSION_TIMEOUT_MINUTES=${AGENT_SESSION_TIMEOUT_MINUTES:-10}
      - MAX_CONCURRENT_TASKS=${AGENT_MAX_CONCURRENT_TASKS:-2}
      - WORKSPACE_DIR=/workspace
      - MAX_INLINE_FILE_BYTES=${MAX_INLINE_FILE_BYTES:-10485760}
      - DOTNET_ROOT=/usr/share/dotnet
      - PATH=/opt/venv/bin:/usr/share/dotnet:$PATH
    volumes:
      - openclaw-workspace:/workspace 
    networks:
      - bot-internal
      - agent-external
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  bot-internal:
    driver: bridge
    name: discord-bot-network
    internal: true        
  bot-external:
    driver: bridge
    name: discord-bot-external
  agent-external:
    driver: bridge
    name: discord-agent-external


volumes:
  bot-data:
    name: discord-bot-data
  bot-cache:
    name: discord-bot-cache
  bot-logs:
    name: discord-bot-logs
  openclaw-workspace:
    name: openclaw-workspace
  