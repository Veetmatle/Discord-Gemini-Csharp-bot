# ============================================================
# Discord Bot AI - Production Docker Compose (VM 2GB RAM)
# ============================================================
# Uses pre-built image from Docker Hub for openclaw agent
# ============================================================

services:
  # --------------------------------------------------------
  # Discord Bot (C# .NET 9.0)
  # --------------------------------------------------------
  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord-bot-ai
    restart: unless-stopped
    depends_on:
      openclaw:
        condition: service_healthy

    # Load secrets from .env file
    env_file:
      - .env

    # Runtime environment configuration
    environment:
      - OPENCLAW_BASE_URL=http://openclaw:8080
      - AGENT_SHARED_VOLUME_PATH=/app/agent-output
      - AGENT_SESSION_TIMEOUT_MINUTES=${AGENT_SESSION_TIMEOUT_MINUTES:-10}
      - AGENT_MAX_RETRIES=${AGENT_MAX_RETRIES:-3}
      - AGENT_MAX_CONCURRENT_TASKS=${AGENT_MAX_CONCURRENT_TASKS:-2}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}

    # Persistent volumes
    # NOTE: bot-cache is NOT mounted to preserve static assets baked into the image
    # The cache directory inside the container already contains champion/item icons
    volumes:
      - bot-data:/app/data
      - bot-logs:/app/logs
      - agent-output:/app/agent-output:ro

    networks:
      - bot-internal

    # Resource limits for 2GB VM (bot gets 512MB max)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

    # Graceful shutdown
    stop_grace_period: 30s

    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /home/botuser:size=16M

    # Log rotation
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------
  # OpenClaw Agent (Python + Claude API)
  # Pre-built image from Docker Hub
  # --------------------------------------------------------
  openclaw:
    image: ahmanamjardir/openclaw-agent:1.0
    container_name: openclaw-agent
    restart: unless-stopped

    # Agent configuration
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash-exp}
      - PORT=8080
      - MAX_ITERATIONS=${AGENT_MAX_RETRIES:-3}
      - AGENT_SESSION_TIMEOUT_MINUTES=${AGENT_SESSION_TIMEOUT_MINUTES:-10}
      - MAX_CONCURRENT_TASKS=${AGENT_MAX_CONCURRENT_TASKS:-2}
      - WORKSPACE_DIR=/workspace
      - DOTNET_ROOT=/usr/share/dotnet
      - PATH=/opt/venv/bin:/usr/share/dotnet:$PATH

    # Agent writes results to shared volume
    volumes:
      - agent-output:/workspace:rw

    networks:
      - bot-internal

    # Resource limits for 2GB VM (agent gets 1.5GB max)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1536M
        reservations:
          cpus: '0.5'
          memory: 512M

    # Graceful shutdown
    stop_grace_period: 15s

    # Security hardening
    security_opt:
      - no-new-privileges:true

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Log rotation
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================
# Networks
# ============================================================
networks:
  bot-internal:
    driver: bridge
    name: discord-bot-network

# ============================================================
# Volumes (persistent data)
# ============================================================
volumes:
  bot-data:
    name: discord-bot-data
  bot-logs:
    name: discord-bot-logs
  agent-output:
    name: discord-bot-agent-output
